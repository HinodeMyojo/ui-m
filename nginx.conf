server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    types {
        application/javascript  js mjs;
        text/css                css;
        text/html               html htm;
        image/svg+xml           svg;
        image/png               png;
        image/jpeg              jpg jpeg;
        image/webp              webp;
        image/x-icon            ico;
        font/woff               woff;
        font/woff2              woff2;
        application/json        json;
        application/wasm        wasm;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # All API proxies → node proxy-server on 3001
    location ~ ^/(deepl-free|deepl-pro|gemini-api|claude-api|openai-api|gigachat-auth|gigachat-api)/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, RqUID" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
